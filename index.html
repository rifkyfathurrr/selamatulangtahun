<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNTUKMU YANG PALING BERSINAR</title>
    <style>
        /* Dasar & Background Animasi */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }

        #bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Layar Pembuka (Dramatis) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 2s;
        }

        .heart {
            color: red;
            font-size: 50px;
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 0px red; }
            50% { transform: scale(1.5); text-shadow: 0 0 20px red; }
            100% { transform: scale(1); text-shadow: 0 0 0px red; }
        }

        /* Konten Utama */
        #main-content {
            display: none;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .title {
            font-size: 4em;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-top: 50px;
            background: linear-gradient(to right, #fff, #ffd700, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: -500%; }
            100% { background-position: 500%; }
        }

        .lebay-text {
            font-size: 1.5em;
            font-style: italic;
            margin: 20px auto;
            max-width: 600px;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(20px);
            transition: 2s all ease;
        }

        .show { opacity: 1; transform: translateY(0); }

        /* Kembang Api Partikel */
        .particle {
            position: absolute;
            width: 5px; height: 5px;
            border-radius: 50%;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="bg-gradient"></div>

    <div id="overlay" onclick="bukaTabir()">
        <div class="heart">❤<br><span style="font-size: 12px; color: white; display: block;">KETUK HATI INI</span></div>
    </div>

    <div id="main-content">
        <h1 class="title">SELAMAT HARI KELAHIRAN!</h1>
        
        <div class="lebay-text" id="text1">Di hari yang sakral ini, semesta seolah berhenti berputar sejenak...</div>
        <div class="lebay-text" id="text2">Hanya untuk merayakan kehadiran jiwa yang begitu luar biasa seperti dirimu.</div>
        <div class="lebay-text" id="text3">Bintang-bintang di langit pun merasa iri melihat sinarmu yang begitu terang benderang.</div>
